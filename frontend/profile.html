<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - CandySocial</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 🍬 Modals & Extra Layout Utilities for Profile Engine */
    .profile-header-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 30px 20px;
    }

    /* 🎯 Perfect Center Circle Avatar Fix */
    .avatar-large-container {
      width: 140px;
      height: 140px;
      margin: 0 auto 15px auto;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .avatar-large {
      width: 140px !important;
      height: 140px !important;
      border-radius: 50% !important;
      object-fit: cover !important;
      border: 4px solid var(--border-color, #E2EFEA);
      box-shadow: var(--shadow-soft);
      display: block;
    }

    .modal {
      display: none; 
      position: fixed; 
      z-index: 9999; 
      left: 0; 
      top: 0;
      width: 100%; 
      height: 100%; 
      background-color: rgba(0, 0, 0, 0.4);
      justify-content: center; 
      align-items: center;
    }
    .modal-content {
      background-color: var(--bg-card, #FFFFFF);
      padding: 25px; 
      border-radius: 20px;
      width: 100%; 
      max-width: 400px; 
      max-height: 420px; 
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 173, 181, 0.15);
      border: 1px solid var(--border-color, #E2EFEA);
      position: relative;
    }
    .close-modal {
      position: absolute; 
      right: 20px; 
      top: 16px; 
      font-size: 1.5rem;
      cursor: pointer; 
      color: var(--text-muted, #736289);
      transition: color 0.2s ease;
    }
    .close-modal:hover {
      color: var(--primary-teal, #00ADB5);
    }
    .user-list-item {
      display: flex; 
      align-items: center; 
      gap: 14px; 
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color, #E2EFEA);
      transition: background 0.2s ease;
    }
    .user-list-item:last-child {
      border-bottom: none;
    }
    .user-list-item img { 
      width: 42px; 
      height: 42px; 
      border-radius: 50%; 
      object-fit: cover; 
      border: 2px solid var(--border-color, #E2EFEA);
    }
    .dp-action-trigger {
      display: inline-block;
      cursor: pointer; 
      font-size: 0.8rem; 
      background: var(--primary-teal, #00ADB5); 
      color: white; 
      padding: 5px 12px; 
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s ease;
    }
    .dp-action-trigger:hover {
      background: var(--primary-hover, #008C92);
    }
    .btn-delete-dp {
      background: #FF5C5C; 
      color: white; 
      border: none; 
      padding: 5px 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 0.8rem;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }
    .btn-delete-dp:hover {
      opacity: 0.9;
    }
    .bio-display { 
      font-size: 0.95rem;
      color: var(--text-main, #1A2536); 
      margin: 12px 0; 
      padding: 4px;
      line-height: 1.4;
    }
    .bio-textarea { 
      width: 100%; 
      padding: 10px; 
      border-radius: 10px; 
      border: 2px solid var(--border-color, #E2EFEA); 
      resize: none;
      height: 65px;
      font-size: 0.9rem;
      outline: none;
      display: none; 
    }
    .bio-textarea:focus {
      border-color: var(--accent-purple, #B19FFB);
    }
    .no-posts-placeholder { 
      text-align: center; 
      padding: 50px 20px; 
      color: var(--text-muted, #736289); 
      font-weight: 600; 
      font-size: 1.05rem;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo-text" onclick="window.location.href='feed.html'" style="cursor: pointer;">🍬 Candy<span>Social</span></h1>
      <div class="nav-links">
        <a href="feed.html" class="nav-item">🏠 Home</a>
        <a href="chat.html" class="nav-item">💬 Messages</a>
        <a href="profile.html" class="nav-item active" id="nav-profile-link">👤 Profile</a>
        <button id="logout-btn" class="btn-logout">🚪 Logout</button>
      </div>
    </div>
  </nav>

  <main class="profile-layout">
    <div class="profile-container">
      
      <div class="card profile-header-card">
        
        <div class="avatar-large-container">
          <img id="profile-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="avatar-large" alt="Profile Picture">
        </div>
        
        <div id="own-dp-controls" class="hidden" style="margin-bottom: 15px; display: flex; gap: 8px; justify-content: center;">
          <label for="dp-file-selector" class="dp-action-trigger">📸 Change</label>
          <input type="file" id="dp-file-selector" accept="image/*" style="display: none;">
          <button id="remove-dp-btn" class="btn-delete-dp">🗑️ Delete</button>
        </div>
        
        <h2 id="profile-username">@username</h2>
        <p id="profile-email" class="text-muted">user@candy.com</p>
        
        <div class="bio-wrapper" style="margin: 15px 0; text-align: center; width: 100%; max-width: 450px;">
          <p id="bio-text-target" class="bio-display">Hello CandySocial! ✨</p>
          <textarea id="bio-edit-input" class="bio-textarea" maxlength="150" placeholder="Write something sweet about yourself..."></textarea>
          
          <div style="margin-top: 6px;">
            <button id="action-edit-bio" class="hidden" style="background: none; border: none; color: var(--primary-teal, #00ADB5); font-weight: 600; cursor: pointer; font-size: 0.85rem;">✏️ Edit Bio</button>
            <button id="action-save-bio" class="hidden" style="background: var(--primary-teal, #00ADB5); color: white; border: none; padding: 4px 12px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 600;">Save</button>
          </div>
        </div>

        <div class="profile-actions" style="margin-top: 5px;">
          <button id="follow-btn" class="btn-primary hidden">➕ Follow</button>
        </div>
        
        <div class="profile-stats" style="margin-top: 15px; display: flex; gap: 25px;">
          <div class="stat-item" id="trigger-followers-modal" style="cursor: pointer; font-weight: 600;">
            <span id="followers-count" style="color: var(--primary-teal); font-size: 1.1rem;">0</span> Followers
          </div>
          <div class="stat-item" id="trigger-following-modal" style="cursor: pointer; font-weight: 600;">
            <span id="following-count" style="color: var(--accent-purple); font-size: 1.1rem;">0</span> Following
          </div>
        </div>

      </div>

      <h3 class="section-title" style="margin-top: 25px;">✨ Sweet Memories</h3>
      <div id="user-posts-container">
        <div class="loading-text">Loading profile posts... 🍬</div>
      </div>

    </div>
  </main>

  <div id="followers-list-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal" id="close-followers-btn">&times;</span>
      <h3 style="margin-bottom: 15px; color: var(--primary-teal, #00ADB5); font-weight: 700;">Followers</h3>
      <div id="followers-box-render"></div>
    </div>
  </div>

  <div id="following-list-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal" id="close-following-btn">&times;</span>
      <h3 style="margin-bottom: 15px; color: var(--accent-purple, #B19FFB); font-weight: 700;">Following</h3>
      <div id="following-box-render"></div>
    </div>
  </div>

  <script src="js/profile.js"></script>
</body>
</html>
