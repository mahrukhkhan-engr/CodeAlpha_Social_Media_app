<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandySocial - Secure Chat 🍬</title>
    <script src="http://localhost:5000/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-main: #f9f6fc;
            --candy-primary: #8e44ad;
            --candy-secondary: #9b59b6;
            --text-main: #2c3e50;
            --border-color: #e8daef;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
        }

        /* Chat Layout Wrapper */
        .chat-container {
            display: flex;
            width: 100%;
            height: 100%;
            background: #fff;
        }

        /* Left Sidebar - User List */
        .sidebar {
            width: 30%;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: #fdfefe;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--candy-primary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .user-item:hover, .user-item.active {
            background-color: #f4ecf7;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 12px;
            object-fit: cover;
            border: 2px solid var(--candy-secondary);
        }

        /* Right Window - Active Chat Area */
        .chat-window {
            width: 70%;
            display: flex;
            flex-direction: column;
            background: #faf8fc;
        }

        .chat-header {
            padding: 15px 20px;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .messages-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Message Bubbles Styling */
        .msg-bubble {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-sent {
            background: var(--candy-primary);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-received {
            background: #ebedef;
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Chat Input Dashboard Controls */
        .chat-input-area {
            padding: 15px 20px;
            background: #fff;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input-area input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
        }

        .action-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        .send-btn {
            background: var(--candy-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .send-btn:hover {
            background: var(--candy-secondary);
        }

        .hidden-input {
            display: none;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Candy Chats 🍬</span>
                <button class="action-btn" onclick="window.location.href='feed.html'">🏠</button>
            </div>
            <div class="user-list" id="users-container">
                <div style="text-align:center; color:#888; padding:20px;">Loading users...</div>
            </div>
        </div>

        <div class="chat-window">
            <div class="chat-header" id="active-chat-header">
                Select a sweet friend to start secure conversation 🔒
            </div>
            
            <div class="messages-area" id="messages-container">
                <div style="text-align:center; color:#aaa; margin-top:150px;">No conversation active.</div>
            </div>

            <form id="chat-form" class="chat-input-area" style="display: none;">
                <button type="button" class="action-btn" id="attach-btn">📎</button>
                <input type="file" id="media-input" class="hidden-input" accept="image/*,video/*">

                <button type="button" class="action-btn" id="mic-btn">🎙️</button>

                <input type="text" id="message-text-input" placeholder="Type a secure message..." autocomplete="off">
                
                <button type="submit" class="send-btn">Send</button>
            </form>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
